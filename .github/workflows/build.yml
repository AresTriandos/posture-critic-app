name: Build iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app for TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
        run: npx eas-cli build --platform ios --profile production --wait

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: npx eas-cli submit --platform ios --profile production --latest --non-interactive

      - name: Build completed
        run: echo "✅ iOS build submitted to TestFlight successfully"
